name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ios-simulator-build:
    name: Analyze, test, and build iOS simulator app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Show Flutter environment
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build iOS simulator app
        run: flutter build ios --simulator --debug --no-codesign

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScaleBuddy-iOS-simulator-app
          path: build/ios/iphonesimulator/Runner.app
          if-no-files-found: error
